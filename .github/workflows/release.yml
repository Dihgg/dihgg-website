name: Release, Build & Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    env:
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
      PUBLIC_GTAG_ID: ${{ vars.PUBLIC_GTAG_ID }}
    outputs:
      release_tag: ${{ steps.get_latest_tag.outputs.LATEST_TAG }}
      changelog_body: ${{ steps.generate_changelog.outputs.result }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Configure git for release commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate release changelog and tag
        run: npm run release

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push --follow-tags origin HEAD

      - name: Get latest tag
        id: get_latest_tag
        run: |
          latest=$(git describe --tags $(git rev-list --tags --max-count=1))
          echo "LATEST_TAG=$latest" >> $GITHUB_OUTPUT

      - name: Get previous tag
        id: get_previous_tag
        run: |
          previous=$(git describe --tags --abbrev=0 $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || true)
          echo "PREVIOUS_TAG=$previous" >> $GITHUB_OUTPUT

      - name: Generate changelog link
        id: generate_changelog
        uses: actions/github-script@v6
        with:
          script: |
            const latestTag = '${{ steps.get_latest_tag.outputs.LATEST_TAG }}';
            const previousTag = '${{ steps.get_previous_tag.outputs.PREVIOUS_TAG }}';
            const repo = context.repo.repo;
            const owner = context.repo.owner;
            if (!previousTag) {
              return `Release notes: https://github.com/${owner}/${repo}/releases/tag/${latestTag}`;
            }
            const changelogUrl = `https://github.com/${owner}/${repo}/compare/${previousTag}...${latestTag}`;
            return `Full Changelog: ${changelogUrl}`;

      - name: Build static site
        run: npm run build

      - name: Create backup ZIP
        run: |
          mkdir -p release
          zip -r ./release/site-dist-${{ steps.get_latest_tag.outputs.LATEST_TAG }}.zip dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist/
          if-no-files-found: error

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist-${{ steps.get_latest_tag.outputs.LATEST_TAG }}
          path: ./release/site-dist-${{ steps.get_latest_tag.outputs.LATEST_TAG }}.zip
          if-no-files-found: error

  create-release:
    needs: build
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download release ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist-${{ needs.build.outputs.release_tag }}
          path: release/

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: Release ${{ needs.build.outputs.release_tag }}
          body: ${{ needs.build.outputs.changelog_body }}
          files: ./release/site-dist-${{ needs.build.outputs.release_tag }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: create-release
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist/

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ vars.FTP_SERVER }}
          username: ${{ vars.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
